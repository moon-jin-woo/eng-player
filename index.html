<html lang="ko"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Black Player</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #playBtn {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 1.5px solid #555555; 
            background-color: #000000;
            color: #bbbbbb; 
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 1px;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.3s ease;
        }

        #playBtn:active {
            border-color: #888888;
            color: #ffffff;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <button id="playBtn">재생</button>

    <script>
        const originalList = [
            '1.mp3',
        ];

        let playlist = [...originalList];
        const audio = new Audio();
        const btn = document.getElementById('playBtn');

        function playRandom() {
            if (playlist.length === 0) {
                playlist = [...originalList];
            }

            const randomIndex = Math.floor(Math.random() * playlist.length);
            const selectedSong = playlist.splice(randomIndex, 1);

            audio.src = selectedSong;
            audio.play()
                .then(() => {
                    btn.innerText = "STOP";
                })
                .catch(e => {
                    btn.innerText = "ERROR";
                });
        }

        btn.addEventListener('click', () => {
            if (audio.paused) {
                if (!audio.src) {
                    playRandom();
                } else {
                    audio.play();
                    btn.innerText = "STOP";
                }
            } else {
                audio.pause();
                btn.innerText = "RESUME";
            }
        });

        audio.addEventListener('ended', () => {
            playRandom();
        });
    </script>



</body></html>
